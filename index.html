<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratite Runner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --text-dark: #1a2e1a;
    --accent: #d4501a;
    --sun: #f5c842;
    --ground: #6b8f5e;
    --dirt: #a0785a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: linear-gradient(180deg, #b8d4e8 0%, #d4e8b8 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    overflow: hidden;
  }

  h1 {
    font-size: clamp(1.8rem, 4.5vw, 3.2rem);
    font-weight: 900;
    color: var(--text-dark);
    letter-spacing: -1px;
    text-align: center;
    margin-bottom: 4px;
    text-shadow: 2px 3px 0 rgba(0,0,0,0.08);
  }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: #4a6a4a;
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  #game-wrapper {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2), 0 0 0 3px #1a2e1a;
  }

  #gameCanvas { display: block; cursor: pointer; }

  #ui-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 20px;
    background: var(--text-dark);
    color: #e8f4e8;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
  }

  #score-display { font-size: 1.05rem; font-weight: 500; }
  #hi-display { color: #a0c8a0; }

  /* ── SELECT SCREEN ── */
  #select-screen {
    position: absolute;
    inset: 0;
    background: rgba(230, 244, 228, 0.97);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 18px 12px 10px;
    gap: 10px;
    z-index: 10;
    overflow-y: auto;
  }

  #select-screen h2 {
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--text-dark);
    flex-shrink: 0;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: #5a7a5a;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    width: 100%;
    text-align: center;
    border-top: 1px solid #c0d8b0;
    padding-top: 6px;
    flex-shrink: 0;
  }

  .animal-cards {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    flex-shrink: 0;
  }

  .animal-card {
    background: white;
    border: 2.5px solid #1a2e1a;
    border-radius: 12px;
    padding: 10px 14px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    min-width: 108px;
    box-shadow: 3px 3px 0 #1a2e1a;
  }

  .animal-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 5px 5px 0 #1a2e1a;
    background: #f0f9ec;
  }

  .animal-card.extinct {
    background: #f8f0ec;
    border-color: #5a3020;
    box-shadow: 3px 3px 0 #5a3020;
  }

  .animal-card.extinct:hover {
    box-shadow: 5px 5px 0 #5a3020;
    background: #fff4f0;
  }

  .animal-card.bonus {
    background: #f0f0ff;
    border-color: #303080;
    box-shadow: 3px 3px 0 #303080;
  }

  .animal-card.bonus:hover {
    box-shadow: 5px 5px 0 #303080;
    background: #f5f5ff;
  }

  .animal-card canvas { border-radius: 6px; }

  .animal-name {
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--text-dark);
    text-align: center;
  }

  .animal-desc {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: #5a7a5a;
    text-align: center;
    line-height: 1.3;
  }

  .extinct-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    background: #8b3a1a;
    color: white;
    border-radius: 4px;
    padding: 1px 5px;
  }

  /* ── GAME OVER ── */
  #gameover-screen {
    position: absolute;
    inset: 0;
    background: rgba(26,46,26,0.9);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 10;
    color: white;
  }

  #gameover-screen h2 {
    font-size: 2.4rem;
    font-weight: 900;
    color: #f5e8c0;
  }

  .score-big {
    font-family: 'DM Mono', monospace;
    font-size: 3rem;
    color: var(--sun);
    font-weight: 500;
  }

  .hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: #a0c8a0;
  }

  #restart-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 11px 26px;
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 0 #8b2a0a;
    transition: transform 0.1s, box-shadow 0.1s;
    margin-top: 4px;
  }

  #restart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #8b2a0a; }
  #restart-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #8b2a0a; }

  #change-animal-btn {
    background: transparent;
    color: #a0c8a0;
    border: 2px solid #a0c8a0;
    border-radius: 8px;
    padding: 7px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  #change-animal-btn:hover { background: rgba(160,200,160,0.2); }
</style>
</head>
<body>

<h1>Ratite Runner</h1>
<p class="subtitle">The flightless bird survival game</p>

<div id="game-wrapper">
  <canvas id="gameCanvas" width="800" height="250"></canvas>
  <div id="ui-bar">
    <span id="score-display">SCORE: <b id="score">0</b></span>
    <span id="hi-display">BEST: <b id="hiscore">0</b></span>
    <span style="font-size:0.68rem;color:#6a8a6a">SPACE / TAP to jump</span>
  </div>

  <!-- Select Screen -->
  <div id="select-screen">
    <h2>Choose your bird</h2>

    <div class="section-label">🌍 True Ratites</div>
    <div class="animal-cards" id="ratite-cards"></div>

    <div class="section-label">💀 Extinct Ratites</div>
    <div class="animal-cards" id="extinct-cards"></div>

    <div class="section-label">⭐ Bonus Birds (not ratites, but beloved)</div>
    <div class="animal-cards" id="bonus-cards"></div>
  </div>

  <!-- Game Over -->
  <div id="gameover-screen">
    <h2>Oh no! 💥</h2>
    <div class="score-big" id="final-score">0</div>
    <div class="hint">press space or tap to retry</div>
    <button id="restart-btn" onclick="restartGame()">Run Again</button>
    <button id="change-animal-btn" onclick="showSelectScreen()">Change Bird</button>
  </div>
</div>

<script>
// ===================== AUDIO =====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playJump() {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(280, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(560, audioCtx.currentTime + 0.12);
  g.gain.setValueAtTime(0.28, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  o.start(); o.stop(audioCtx.currentTime + 0.2);
}

function playDie() {
  ensureAudio();
  [200, 155, 110].forEach((freq, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sawtooth'; o.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.1;
    g.gain.setValueAtTime(0.22, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.start(t); o.stop(t + 0.15);
  });
}

function playScore() {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'triangle';
  o.frequency.setValueAtTime(880, audioCtx.currentTime);
  o.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.07);
  g.gain.setValueAtTime(0.18, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  o.start(); o.stop(audioCtx.currentTime + 0.2);
}

function playPenguin() {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'triangle';
  o.frequency.setValueAtTime(440, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(280, audioCtx.currentTime + 0.15);
  o.frequency.exponentialRampToValueAtTime(360, audioCtx.currentTime + 0.3);
  g.gain.setValueAtTime(0.18, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
  o.start(); o.stop(audioCtx.currentTime + 0.35);
}

function playBoom() { // for extinct animals
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(120, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.4);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
  o.start(); o.stop(audioCtx.currentTime + 0.45);
}

function playKiwi() { // kiwi call - high pitched
  ensureAudio();
  [1200,1400,1600].forEach((freq, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine'; o.frequency.value = freq;
    const t = audioCtx.currentTime + i*0.12;
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.start(t); o.stop(t + 0.1);
  });
}

function playCassowaryRumble() {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(32, audioCtx.currentTime);
  o.frequency.setValueAtTime(28, audioCtx.currentTime + 0.2);
  g.gain.setValueAtTime(0.35, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  o.start(); o.stop(audioCtx.currentTime + 0.5);
}

// ===================== CANVAS =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND_Y = H - 40;
const PLAYER_X = 90;

let selectedAnimal = null;
let gameState = 'select';
let score = 0, hiScore = 0, frame = 0;
let speed = 5, speedTimer = 0;

let player = { y: GROUND_Y, vy: 0, onGround: true, legPhase: 0, blinkTimer: 120, blink: false, jumpCount: 0 };
let obstacles = [], obstacleTimer = 0, minObstacleGap = 80;
let powerups = [], powerupTimer = 300;
let activePowerup = null, activePowerupTimer = 0;
let speedBeforeSlow = 5, shieldFlash = 0, paragliderAngle = 0;
const POWERUP_DURATION = 220;
const POWERUP_TYPES = ['shield', 'paraglider', 'clock'];
let clouds = [{ x:200,y:30,scale:1 },{ x:500,y:50,scale:0.7 },{ x:700,y:20,scale:1.3 }];
let groundOffset = 0;

// ===================== ANIMALS =====================
const animals = {

  // ── OSTRICH ──
  ostrich: {
    w:64, h:90, category:'ratite',
    name:'Ostrich', desc:'Fastest bipedal\nanimal on Earth',
    draw(ctx,x,y,t,blink) {
      const ls=Math.sin(t)*18;
      // Shadow
      ctx.save();ctx.globalAlpha=0.15;ctx.fillStyle='#000';
      ctx.beginPath();ctx.ellipse(x+8,y+2,22,5,0,0,Math.PI*2);ctx.fill();ctx.restore();
      // Legs
      ctx.strokeStyle='#d8c090';ctx.lineWidth=4;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(x+2,y-18);ctx.lineTo(x+2+ls,y+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+2+ls,y+4);ctx.lineTo(x+2+ls-4,y+20);ctx.stroke();
      ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(x+2+ls-4,y+20);ctx.lineTo(x+2+ls-10,y+22);ctx.moveTo(x+2+ls-4,y+20);ctx.lineTo(x+2+ls,y+22);ctx.stroke();
      ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(x+14,y-18);ctx.lineTo(x+14-ls,y+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+14-ls,y+4);ctx.lineTo(x+14-ls+4,y+20);ctx.stroke();
      ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(x+14-ls+4,y+20);ctx.lineTo(x+14-ls-2,y+22);ctx.moveTo(x+14-ls+4,y+20);ctx.lineTo(x+14-ls+8,y+22);ctx.stroke();
      // Body
      ctx.save();
      const bg=ctx.createRadialGradient(x+6,y-34,5,x+6,y-34,26);
      bg.addColorStop(0,'#2a2a2a');bg.addColorStop(1,'#0a0a0a');
      ctx.fillStyle=bg;ctx.strokeStyle='#000';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.ellipse(x+6,y-34,22,18,-0.1,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();
      // White tail
      ctx.fillStyle='#f0ede8';ctx.strokeStyle='#c0bdb8';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x-14,y-30);ctx.bezierCurveTo(x-22,y-38,x-24,y-44,x-18,y-48);ctx.bezierCurveTo(x-14,y-46,x-12,y-38,x-10,y-30);ctx.fill();ctx.stroke();
      // Neck
      ctx.save();
      const ng=ctx.createLinearGradient(x+22,y-44,x+32,y-80);
      ng.addColorStop(0,'#e8b0a0');ng.addColorStop(1,'#d89080');
      ctx.fillStyle=ng;ctx.strokeStyle='#b07060';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x+18,y-46);ctx.bezierCurveTo(x+22,y-58,x+26,y-72,x+30,y-82);ctx.bezierCurveTo(x+36,y-82,x+38,y-72,x+34,y-62);ctx.bezierCurveTo(x+30,y-52,x+24,y-46,x+18,y-46);ctx.fill();ctx.stroke();ctx.restore();
      // Head
      ctx.save();
      const hg=ctx.createRadialGradient(x+32,y-87,2,x+32,y-87,9);
      hg.addColorStop(0,'#f0c0a8');hg.addColorStop(1,'#d09080');
      ctx.fillStyle=hg;ctx.strokeStyle='#b07060';ctx.lineWidth=1;
      ctx.beginPath();ctx.ellipse(x+32,y-87,9,7,0.1,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();
      // Bill
      ctx.fillStyle='#e0c890';ctx.strokeStyle='#b09060';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x+38,y-87);ctx.lineTo(x+50,y-85);ctx.lineTo(x+50,y-89);ctx.lineTo(x+38,y-89);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+38,y-87);ctx.lineTo(x+50,y-87);ctx.stroke();
      // Eye
      ctx.fillStyle=blink?'#d09080':'white';ctx.beginPath();ctx.arc(x+35,y-90,3,0,Math.PI*2);ctx.fill();
      if(!blink){ctx.fillStyle='#3a1a08';ctx.beginPath();ctx.arc(x+36,y-90,1.8,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.arc(x+36.5,y-91,0.6,0,Math.PI*2);ctx.fill();}
      // Eyelashes
      ctx.strokeStyle='#0a0a0a';ctx.lineWidth=0.8;
      for(let i=0;i<5;i++){const a=-Math.PI/2-0.4+i*0.2;ctx.beginPath();ctx.moveTo(x+35+Math.cos(a)*3,y-90+Math.sin(a)*3);ctx.lineTo(x+35+Math.cos(a)*5.5,y-90+Math.sin(a)*5.5);ctx.stroke();}
    }
  },

  // ── EMU ──
  emu: {
    w:60, h:82, category:'ratite',
    name:'Emu', desc:"Australia's\ntallest bird",
    draw(ctx,x,y,t,blink) {
      const ls=Math.sin(t)*15;
      ctx.save();ctx.globalAlpha=0.15;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(x+6,y+2,20,5,0,0,Math.PI*2);ctx.fill();ctx.restore();
      // Legs (grey-blue)
      ctx.strokeStyle='#8090a0';ctx.lineWidth=3.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(x+2,y-14);ctx.lineTo(x+2+ls,y+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+2+ls,y+4);ctx.lineTo(x+2+ls-3,y+18);ctx.stroke();
      ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(x+2+ls-3,y+18);ctx.lineTo(x+2+ls-8,y+20);ctx.moveTo(x+2+ls-3,y+18);ctx.lineTo(x+2+ls+1,y+20);ctx.moveTo(x+2+ls-3,y+18);ctx.lineTo(x+2+ls+4,y+20);ctx.stroke();
      ctx.lineWidth=3.5;
      ctx.beginPath();ctx.moveTo(x+12,y-14);ctx.lineTo(x+12-ls,y+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+12-ls,y+4);ctx.lineTo(x+12-ls+3,y+18);ctx.stroke();
      ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(x+12-ls+3,y+18);ctx.lineTo(x+12-ls-2,y+20);ctx.moveTo(x+12-ls+3,y+18);ctx.lineTo(x+12-ls+6,y+20);ctx.moveTo(x+12-ls+3,y+18);ctx.lineTo(x+12-ls+10,y+20);ctx.stroke();
      // Body (shaggy brown-black)
      ctx.save();
      const bg=ctx.createRadialGradient(x+4,y-30,4,x+4,y-30,22);
      bg.addColorStop(0,'#4a3a28');bg.addColorStop(0.7,'#2a2018');bg.addColorStop(1,'#181008');
      ctx.fillStyle=bg;ctx.strokeStyle='#181008';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.ellipse(x+4,y-30,20,17,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();
      // Shaggy feather lines
      ctx.strokeStyle='rgba(100,80,40,0.5)';ctx.lineWidth=1;
      for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(x-14+i*6,y-22);ctx.bezierCurveTo(x-12+i*6,y-30,x-10+i*6,y-36,x-8+i*6,y-42);ctx.stroke();}
      // Vestigial wings (emus have tiny vestigial wings)
      ctx.strokeStyle='#3a2a18';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(x-16,y-30);ctx.bezierCurveTo(x-20,y-36,x-18,y-40,x-12,y-36);ctx.stroke();
      // Neck (blue-ish bare skin)
      ctx.save();
      const ng=ctx.createLinearGradient(x+18,y-38,x+26,y-70);
      ng.addColorStop(0,'#4a6080');ng.addColorStop(0.5,'#3a7090');ng.addColorStop(1,'#2a5878');
      ctx.fillStyle=ng;ctx.strokeStyle='#1a4060';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x+14,y-40);ctx.bezierCurveTo(x+18,y-52,x+22,y-64,x+24,y-72);ctx.bezierCurveTo(x+30,y-72,ctx.p=x+30,y-64,x+26,y-52);ctx.bezierCurveTo(x+22,y-42,x+18,y-40,x+14,y-40);ctx.fill();ctx.stroke();ctx.restore();
      // Head
      ctx.save();
      const hg=ctx.createRadialGradient(x+26,y-78,2,x+26,y-78,9);
      hg.addColorStop(0,'#4a6888');hg.addColorStop(1,'#2a4868');
      ctx.fillStyle=hg;ctx.strokeStyle='#1a3858';ctx.lineWidth=1;
      ctx.beginPath();ctx.ellipse(x+26,y-78,9,7,0.05,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();
      // Bill
      ctx.fillStyle='#8090a0';ctx.strokeStyle='#506070';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x+32,y-78);ctx.lineTo(x+44,y-76);ctx.lineTo(x+44,y-80);ctx.lineTo(x+32,y-80);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+32,y-78);ctx.lineTo(x+44,y-78);ctx.stroke();
      // Eye (red)
      ctx.fillStyle=blink?'#2a4868':'#cc3020';ctx.beginPath();ctx.arc(x+29,y-81,2.8,0,Math.PI*2);ctx.fill();
      if(!blink){ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.arc(x+29.5,y-81,1.5,0,Math.PI*2);ctx.fill();}
    }
  },

  // ── KIWI ──
  kiwi: {
    w:52, h:46, category:'ratite',
    name:'Kiwi', desc:'Nocturnal · Has\nnostrils at bill tip',
    draw(ctx,x,y,t,blink) {
      const ls=Math.sin(t)*7;

// ===================== BUILD SELECT SCREEN =====================
function buildSelectScreen() {
  const ratiteCards = document.getElementById('ratite-cards');
  const extinctCards = document.getElementById('extinct-cards');
  const bonusCards = document.getElementById('bonus-cards');

  animalList.forEach(a => {
    const card = document.createElement('div');
    card.className = 'animal-card' + (a.category === 'extinct' ? ' extinct' : '') + (a.category === 'bonus' ? ' bonus' : '');
    card.onclick = () => selectAnimal(a.id);

    const pc = document.createElement('canvas');
    pc.width = 90; pc.height = 90;
    pc.id = 'prev-' + a.id;
    card.appendChild(pc);

    const nameEl = document.createElement('div');
    nameEl.className = 'animal-name';
    nameEl.textContent = a.name;
    card.appendChild(nameEl);

    if (a.category === 'extinct') {
      const badge = document.createElement('div');
      badge.className = 'extinct-badge';
      badge.textContent = '💀 EXTINCT';
      card.appendChild(badge);
    }

    const descEl = document.createElement('div');
    descEl.className = 'animal-desc';
    descEl.textContent = a.desc.replace('\\n', '\n');
    card.appendChild(descEl);

    if (a.category === 'ratite') ratiteCards.appendChild(card);
    else if (a.category === 'extinct') extinctCards.appendChild(card);
    else bonusCards.appendChild(card);
  });

  // Draw previews after DOM is ready
  requestAnimationFrame(() => {
    animalList.forEach(a => drawPreview(a.id));
  });
}

function drawPreview(id) {
  const pc = document.getElementById('prev-' + id);
  if (!pc) return;
  const pctx = pc.getContext('2d');
  pctx.clearRect(0, 0, 90, 90);
  pctx.fillStyle = '#eef8e8';
  pctx.fillRect(0, 0, 90, 90);
  pctx.fillStyle = '#6b8f5e';
  pctx.fillRect(0, 78, 90, 12);
  pctx.fillStyle = '#a0785a';
  pctx.fillRect(0, 78, 90, 3);
  pctx.save();
  animals[id].draw(pctx, 10, 78, 0.2, false);
  pctx.restore();
}

buildSelectScreen();

        g.addColorStop(0,'#5a9830');g.addColorStop(1,'#2a5810');
        ctx.fillStyle=g;ctx.strokeStyle='#1a3808';ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(x+c.cx,y+c.cy,c.r,0,Math.PI*2);ctx.fill();ctx.stroke();
      });
    }
  },
  {
    name:'cactus', w:24, h:50,
    draw(ctx,x,y) {
      ctx.fillStyle='#4a8838';ctx.strokeStyle='#2a5820';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(x+8,y-46,8,46,3);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.roundRect(x,y-34,8,5,2);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.roundRect(x,y-38,5,14,2);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.roundRect(x+16,y-28,8,5,2);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.roundRect(x+19,y-34,5,14,2);ctx.fill();ctx.stroke();
      ctx.strokeStyle='#e8e0a0';ctx.lineWidth=0.8;
      [[10,y-40],[12,y-30],[15,y-20],[10,y-10]].forEach(([px,py])=>{ctx.beginPath();ctx.moveTo(x+px-3,py);ctx.lineTo(x+px-7,py-3);ctx.stroke();ctx.beginPath();ctx.moveTo(x+px-3,py);ctx.lineTo(x+px-7,py+3);ctx.stroke();});
    }
  },
  {
    name:'log', w:36, h:22,
    draw(ctx,x,y) {
      const g=ctx.createLinearGradient(x,y-22,x,y);
      g.addColorStop(0,'#8a5830');g.addColorStop(1,'#5a3018');
      ctx.fillStyle=g;ctx.strokeStyle='#3a1808';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(x,y-20,36,20,5);ctx.fill();ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x+4,y-14);ctx.lineTo(x+32,y-14);ctx.stroke();
      // End rings
      ctx.strokeStyle='#3a1808';ctx.lineWidth=1;
      ctx.beginPath();ctx.ellipse(x+3,y-10,3,10,0,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.ellipse(x+33,y-10,3,10,0,0,Math.PI*2);ctx.stroke();
    }
  }
];

// ===================== GAME LOGIC =====================
function selectAnimal(id) {
  selectedAnimal = id;
  document.getElementById('select-screen').style.display = 'none';
  // Play species-specific sound on select
  if (id === 'penguin') setTimeout(playPenguin, 100);
  else if (id === 'kiwi') setTimeout(playKiwi, 100);
  else if (id === 'cassowary') setTimeout(playCassowaryRumble, 100);
  else if (id === 'moa' || id === 'elephantbird') setTimeout(playBoom, 100);
  startGame();
}

function showSelectScreen() {
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
  gameState = 'select';
}

function startGame() {
  gameState = 'playing';
  score = 0; speed = 5; speedTimer = 0; frame = 0;
  obstacles = []; obstacleTimer = 70 + Math.random()*40;
  minObstacleGap = 80;
  player.y = GROUND_Y; player.vy = 0; player.onGround = true;
  player.legPhase = 0; player.blinkTimer = 100 + Math.random()*150;
  player.blink = false; player.jumpCount = 0;
  groundOffset = 0;
  powerups = []; powerupTimer = 260 + Math.random()*200;
  activePowerup = null; activePowerupTimer = 0;
  speedBeforeSlow = 5; shieldFlash = 0; paragliderAngle = 0;
}

function restartGame() {
  document.getElementById('gameover-screen').style.display = 'none';
  startGame();
}

function jump() {
  ensureAudio();
  if (gameState === 'dead') { restartGame(); return; }
  if (gameState === 'select') return;
  if (player.onGround || player.jumpCount < 1) {
    player.vy = -14; player.onGround = false; player.jumpCount++;
    playJump();
    if (selectedAnimal === 'penguin' && player.jumpCount === 1) setTimeout(playPenguin, 150);
    if (selectedAnimal === 'kiwi' && player.jumpCount === 1) setTimeout(playKiwi, 100);
    if (selectedAnimal === 'cassowary' && player.jumpCount === 1) setTimeout(playCassowaryRumble, 150);
  }
}

document.addEventListener('keydown', e => { if (e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();} });
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); });

// ===================== POWER-UP SOUNDS =====================
function playPowerupCollect(type) {
  ensureAudio();
  if (type === 'shield') {
    [440,554,659,880].forEach((f,i) => {
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.value=f;
      const t=audioCtx.currentTime+i*0.07;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.16,t+0.03);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.18);o.start(t);o.stop(t+0.2);
    });
  } else if (type === 'paraglider') {
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);o.type='sawtooth';
    o.frequency.setValueAtTime(200,audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(700,audioCtx.currentTime+0.35);
    g.gain.setValueAtTime(0.15,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
    o.start();o.stop(audioCtx.currentTime+0.4);
  } else if (type === 'clock') {
    [880,660].forEach((f,i) => {
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);o.type='square';o.frequency.value=f;
      const t=audioCtx.currentTime+i*0.13;
      g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
      o.start(t);o.stop(t+0.13);
    });
  }
}
function playPowerupExpire() {
  ensureAudio();
  [440,330,220].forEach((f,i) => {
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.value=f;
    const t=audioCtx.currentTime+i*0.1;
    g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    o.start(t);o.stop(t+0.14);
  });
}

// ===================== UPDATE =====================
function update() {
  if (gameState !== 'playing') return;
  frame++; score++;
  if (score % 100 === 0) playScore();

  if (activePowerup !== 'clock') {
    speedTimer++;
    if (speedTimer > 400) { speed = Math.min(speed + 0.3, 14); speedTimer = 0; }
  }

  groundOffset = (groundOffset + speed) % 40;

  if (activePowerup === 'paraglider') {
    const floatY = GROUND_Y - 88;
    player.y += (floatY - player.y) * 0.09;
    player.vy = 0; player.onGround = false;
    paragliderAngle = Math.sin(frame * 0.06) * 0.07;
  } else {
    if (!player.onGround) { player.vy += 0.7; player.y += player.vy; }
    if (player.y >= GROUND_Y) { player.y = GROUND_Y; player.vy = 0; player.onGround = true; player.jumpCount = 0; }
  }

  if (player.onGround) player.legPhase += 0.22 * (speed/5);
  else player.legPhase += 0.05;

  player.blinkTimer--;
  if (player.blinkTimer <= 0) {
    player.blink = !player.blink;
    player.blinkTimer = player.blink ? 6 : (Math.random()*200+100);
  }

  clouds.forEach(c => {
    c.x -= speed * 0.15;
    if (c.x < -100) { c.x = W+50; c.y = 15+Math.random()*50; c.scale = 0.6+Math.random()*0.9; }
  });

  obstacleTimer--;
  if (obstacleTimer <= 0) {
    const type = obstacleTypes[Math.floor(Math.random()*obstacleTypes.length)];
    obstacles.push({ type, x: W+20 });
    obstacleTimer = (minObstacleGap + Math.random()*60) * (5/speed);
    minObstacleGap = Math.max(50, minObstacleGap - 1);
  }
  obstacles.forEach(o => o.x -= speed);
  obstacles = obstacles.filter(o => o.x > -80);

  // Spawn power-ups
  powerupTimer--;
  if (powerupTimer <= 0) {
    const type = POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
    powerups.push({ type, x: W+20, y: GROUND_Y - 30, bob: Math.random()*Math.PI*2 });
    powerupTimer = 320 + Math.random()*240;
  }
  powerups.forEach(p => { p.x -= speed; p.bob += 0.07; });
  powerups = powerups.filter(p => p.x > -40);

  // Collect power-ups
  const ah2 = animals[selectedAnimal].h;
  const pux = PLAYER_X - 4, puy = player.y - ah2 + 12;
  for (let i = powerups.length-1; i >= 0; i--) {
    const p = powerups[i];
    const pcx = p.x + 14, pcy = p.y + Math.sin(p.bob)*5;
    if (Math.abs(pux+17 - pcx) < 30 && Math.abs(puy+20 - pcy) < 30) {
      if (activePowerup === 'clock') speed = speedBeforeSlow;
      activePowerup = p.type; activePowerupTimer = POWERUP_DURATION;
      playPowerupCollect(p.type);
      if (p.type === 'clock') { speedBeforeSlow = speed; speed = Math.max(2, speed * 0.45); }
      if (p.type === 'paraglider') { player.onGround = false; player.vy = -4; }
      powerups.splice(i, 1);
    }
  }

  // Active power-up tick
  if (activePowerup) {
    activePowerupTimer--;
    shieldFlash += 0.18;
    if (activePowerupTimer <= 0) {
      if (activePowerup === 'clock') speed = speedBeforeSlow;
      playPowerupExpire();
      activePowerup = null;
    }
  }

  // Collision (shield and paraglider both grant immunity)
  const ah = animals[selectedAnimal].h;
  const px = PLAYER_X - 4, py = player.y - ah + 12;
  const pw = 34, ph = ah - 20;

  if (activePowerup !== 'shield' && activePowerup !== 'paraglider') {
    for (let o of obstacles) {
      const ox=o.x+4, oy=GROUND_Y-o.type.h+6, ow=o.type.w-8, oh=o.type.h-8;
      if (px<ox+ow && px+pw>ox && py<oy+oh && py+ph>oy) {
        gameState = 'dead';
        if (score > hiScore) hiScore = score;
        document.getElementById('hiscore').textContent = hiScore;
        document.getElementById('final-score').textContent = score;
        document.getElementById('gameover-screen').style.display = 'flex';
        playDie();
        return;
      }
    }
  }

  document.getElementById('score').textContent = score;
}

// ===================== DRAW =====================
function drawPowerupItem(cx, cy, type) {
  const r = 13;
  if (type === 'shield') {
    const g=ctx.createRadialGradient(cx-4,cy-4,1,cx,cy,r+3);
    g.addColorStop(0,'#80d8ff');g.addColorStop(0.6,'#2196f3');g.addColorStop(1,'#0d47a1');
    ctx.save();ctx.shadowBlur=10;ctx.shadowColor='#42a5f5';
    ctx.fillStyle=g;ctx.strokeStyle='#e3f2fd';ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.arc(cx,cy,r*0.33,0,Math.PI*2);ctx.fill();
    ctx.restore();
  } else if (type === 'paraglider') {
    ctx.save();ctx.shadowBlur=8;ctx.shadowColor='#ff9800';
    const cols=['#f44336','#ff9800','#ffeb3b','#4caf50','#2196f3','#9c27b0'];
    for(let i=0;i<6;i++){
      ctx.fillStyle=cols[i];ctx.beginPath();ctx.moveTo(cx,cy+3);
      ctx.arc(cx,cy+3,r*1.15,Math.PI+i*Math.PI/6,Math.PI+(i+1)*Math.PI/6);
      ctx.closePath();ctx.fill();
    }
    ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(cx,cy+3,r*1.15,Math.PI,0);ctx.stroke();
    ctx.strokeStyle='rgba(60,40,0,0.4)';ctx.lineWidth=0.9;
    ctx.beginPath();ctx.moveTo(cx-7,cy+5);ctx.lineTo(cx,cy+r+4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+7,cy+5);ctx.lineTo(cx,cy+r+4);ctx.stroke();
    ctx.restore();
  } else if (type === 'clock') {
    const g=ctx.createRadialGradient(cx-4,cy-4,1,cx,cy,r+2);
    g.addColorStop(0,'#fff9c4');g.addColorStop(0.5,'#ffc107');g.addColorStop(1,'#e65100');
    ctx.save();ctx.shadowBlur=10;ctx.shadowColor='#ffc107';
    ctx.fillStyle=g;ctx.strokeStyle='#fff8e1';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.18)';ctx.beginPath();ctx.arc(cx,cy,r*0.72,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.45)';ctx.lineWidth=0.9;
    for(let i=0;i<12;i++){const a=i*Math.PI/6;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*r*0.58,cy+Math.sin(a)*r*0.58);ctx.lineTo(cx+Math.cos(a)*r*0.72,cy+Math.sin(a)*r*0.72);ctx.stroke();}
    ctx.strokeStyle='rgba(0,0,0,0.65)';ctx.lineWidth=1.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(-1.2)*r*0.44,cy+Math.sin(-1.2)*r*0.44);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(0.8)*r*0.54,cy+Math.sin(0.8)*r*0.54);ctx.stroke();
    ctx.restore();
  }
}

function drawShieldEffect() {
  const cx=PLAYER_X+6, cy=player.y - animals[selectedAnimal].h*0.5;
  const r=38, alpha=0.25+0.18*Math.sin(shieldFlash*3);
  ctx.save();
  ctx.shadowBlur=16;ctx.shadowColor='#42a5f5';
  ctx.strokeStyle=`rgba(33,150,243,${0.65+0.3*Math.sin(shieldFlash*2)})`;
  ctx.lineWidth=2.5;
  ctx.beginPath();
  for(let i=0;i<6;i++){const ang=i*Math.PI/3+shieldFlash*0.25;ctx.lineTo(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);}
  ctx.closePath();ctx.stroke();
  ctx.fillStyle=`rgba(33,150,243,${alpha})`;ctx.fill();
  ctx.restore();
}

function drawParagliderEffect() {
  const bx=PLAYER_X-20, by=player.y;
  const ah=animals[selectedAnimal].h;
  ctx.save();
  ctx.translate(bx+22, by - ah + 8);
  ctx.rotate(paragliderAngle);
  const cols=['#f44336','#ff9800','#ffeb3b','#4caf50','#2196f3','#9c27b0'];
  const r=42, canopyY=-50;
  for(let i=0;i<6;i++){
    ctx.fillStyle=cols[i];ctx.beginPath();ctx.moveTo(0,0);
    ctx.arc(0,canopyY,r,Math.PI+i*Math.PI/6,Math.PI+(i+1)*Math.PI/6);
    ctx.closePath();ctx.fill();
  }
  ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(0,canopyY,r,Math.PI,0);ctx.stroke();
  ctx.strokeStyle='rgba(40,20,0,0.45)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-16,canopyY+6);ctx.lineTo(-8,-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(16,canopyY+6);ctx.lineTo(8,-2);ctx.stroke();
  ctx.restore();
}

function drawClockEffect() {
  const cx=PLAYER_X+2, cy=player.y - animals[selectedAnimal].h*0.5;
  for(let ring=0;ring<2;ring++){
    const r=((frame*0.8 + ring*30)%60);
    ctx.save();ctx.globalAlpha=Math.max(0,(60-r)/60)*0.22;
    ctx.strokeStyle='#5c6bc0';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  ctx.save();ctx.globalAlpha=0.06;ctx.fillStyle='#3f51b5';ctx.fillRect(0,0,W,H);ctx.restore();
}

function drawPowerupHUD() {
  if (!activePowerup) return;
  const frac=activePowerupTimer/POWERUP_DURATION;
  const barW=110, barH=7, bx=W/2-barW/2, by=8;
  const warning=activePowerupTimer<60 && Math.floor(frame/7)%2===0;
  const cols={shield:'#2196f3',paraglider:'#ff9800',clock:'#ffc107'};
  const labels={shield:'🛡 SHIELD',paraglider:'🪂 PARAGLIDER',clock:'⏱ SLOW-MO'};
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.28)';ctx.beginPath();ctx.roundRect(bx-2,by-1,barW+4,barH+2,4);ctx.fill();
  ctx.fillStyle=warning?'#f44336':cols[activePowerup];
  ctx.beginPath();ctx.roundRect(bx,by,Math.max(3,barW*frac),barH,3);ctx.fill();
  ctx.fillStyle=warning?'#ff8a80':'rgba(255,255,255,0.9)';
  ctx.font="bold 8px 'DM Mono',monospace";ctx.textAlign='center';
  ctx.fillText(labels[activePowerup],W/2,by-2);
  ctx.restore();
}

function drawCloud(x,y,scale) {
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);
  ctx.fillStyle='rgba(255,255,255,0.82)';
  ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.arc(20,-5,22,0,Math.PI*2);ctx.arc(42,0,16,0,Math.PI*2);ctx.arc(24,6,18,0,Math.PI*2);
  ctx.fill();ctx.restore();
}

function drawGround() {
  const sky=ctx.createLinearGradient(0,0,0,GROUND_Y);
  sky.addColorStop(0,'#b8d8f0');sky.addColorStop(1,'#dff0c8');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,GROUND_Y);
  ctx.fillStyle='#6b8f5e';ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  ctx.fillStyle='#a0785a';ctx.fillRect(0,GROUND_Y,W,8);
  ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=1;
  for(let gx=-groundOffset;gx<W;gx+=40){ctx.beginPath();ctx.moveTo(gx,GROUND_Y+2);ctx.lineTo(gx+20,GROUND_Y+2);ctx.stroke();}
  ctx.strokeStyle='#4a7030';ctx.lineWidth=1.5;
  for(let gx=(-groundOffset*2)%60;gx<W;gx+=60){
    for(let j=0;j<3;j++){const tx=gx+j*5;ctx.beginPath();ctx.moveTo(tx,GROUND_Y);ctx.lineTo(tx-2,GROUND_Y-6);ctx.stroke();ctx.beginPath();ctx.moveTo(tx,GROUND_Y);ctx.lineTo(tx+2,GROUND_Y-7);ctx.stroke();}
  }
}

function draw() {
  ctx.clearRect(0,0,W,H);
  drawGround();
  if (activePowerup === 'clock') drawClockEffect();
  clouds.forEach(c=>drawCloud(c.x,c.y,c.scale));

  const meters=Math.floor(score/10);
  ctx.fillStyle='rgba(26,46,26,0.55)';
  ctx.font="bold 13px 'DM Mono',monospace";
  ctx.textAlign='right';ctx.fillText(meters+'m',W-12,22);ctx.textAlign='left';

  obstacles.forEach(o=>o.type.draw(ctx,o.x,GROUND_Y));

  // Floating power-up collectibles
  powerups.forEach(p => {
    const cy = p.y + Math.sin(p.bob)*5;
    drawPowerupItem(p.x+14, cy, p.type);
  });

  // Paraglider wings drawn behind bird
  if (activePowerup === 'paraglider') drawParagliderEffect();

  if (selectedAnimal) {
    const bob = player.onGround ? Math.sin(player.legPhase*2)*1.5 : 0;
    animals[selectedAnimal].draw(ctx,PLAYER_X-20,player.y+bob,player.legPhase,player.blink);
  }

  // Shield drawn over bird
  if (activePowerup === 'shield') drawShieldEffect();

  if (!player.onGround) {
    const ss=Math.max(5,18-(GROUND_Y-player.y)*0.05);
    ctx.save();ctx.globalAlpha=0.13;ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(PLAYER_X,GROUND_Y+2,ss,4,0,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  drawPowerupHUD();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
